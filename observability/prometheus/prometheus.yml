# prometheus.yml — supervision système/services TricorderKit.
# Générique : cibles loopback. Ajouter un node_exporter / des /metrics applicatifs au besoin.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # node_exporter (CPU/RAM/disque) — décommenter après l'avoir déployé :
  # - job_name: node
  #   static_configs:
  #     - targets: ["host.docker.internal:9100"]

  # Gateway LiteLLM /metrics (si exposé) — adapter le port :
  # - job_name: llm-gateway
  #   static_configs:
  #     - targets: ["host.docker.internal:4000"]
