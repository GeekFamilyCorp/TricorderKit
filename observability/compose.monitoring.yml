# compose.monitoring.yml — stack supervision (Prometheus + Grafana).
# Net-new DEC-051 (roadmap B). À lancer à la demande : docker compose -f observability/compose.monitoring.yml up -d
# Sécurité : bind LOOPBACK uniquement ; mot de passe Grafana via env (jamais en clair).
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: tricorder-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tricorder-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"   # 3001 = Langfuse ; Grafana sur 3002
    depends_on: [prometheus]
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
