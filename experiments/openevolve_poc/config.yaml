# config.yaml — OpenEvolve pour le PoC dédup TricorderKit (LLM LOCAL, GPU-free).
# Lance : pip install openevolve ; puis
#   python openevolve-run.py experiments/openevolve_poc/initial_program.py \
#          experiments/openevolve_poc/evaluator.py --config experiments/openevolve_poc/config.yaml \
#          --iterations 60
max_iterations: 60
random_seed: 42            # reproductibilite (meme convention qu'OpenEvolve)

llm:
  # LLM LOCAL Ollama — aucune cle cloud, cout ~0. (Ou gateway Hermes du VPS via son api_base.)
  api_base: "http://localhost:11434/v1"
  models:
    - name: "qwen2.5-coder:7b"   # adapter au modele local dispo (ollama list)
      weight: 1.0
  temperature: 0.7

database:
  population_size: 40
  num_islands: 3
  feature_dimensions: ["recall", "precision"]   # qualite-diversite sur nos metriques

evaluator:
  cascade_evaluation: true     # ecarte vite les programmes casses
  use_llm_feedback: false      # metrique deterministe (F1) suffit ici

prompt:
  system_message: |
    Tu es un expert en resolution d'entites (deduplication de titres).
    Objectif : MAXIMISER le F1 de detection des doublons dans `initial_program.py`.
    Tu peux modifier les parametres du bloc EVOLVE (BLOCK_THRESHOLD, FUZZY_THRESHOLD, TOPK)
    ET la logique de `predict` (ex. normalisation, ponderation cosinus/fuzzy, blocking).
    CONTRAINTES : ne change pas la signature de `predict(titles)` ; le code doit rester
    deterministe et hors-ligne (pas de nouvel appel reseau). Renvoie un programme Python valide.
