# ── Example category 1 (replace with your domain) ───────────────────────────
content:
  - id: example_api_1
    name: Example API Source 1
    url: https://api.example.com/v1
    type: api_rest
    category: content
    active: true
    cache_ttl: 900
    notes: "Replace with your actual primary API source"

  - id: example_rss_1
    name: Example RSS Feed 1
    url: https://example.com/rss
    type: rss
    category: content
    active: true
    cache_ttl: 1800
    notes: "Replace with your actual RSS source"

