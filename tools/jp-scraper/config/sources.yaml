# sources.yaml — Web scraper source configuration
# Replace these placeholder sources with your actual target sites
# Version: 0.1.0 — stub
#
# Modes: auto | rss | http | trafilatura | playwright
# auto = tries rss first, falls back to http, then trafilatura

sources:
  - id: example_rss_source
    name: Example RSS Source
    url: https://example.com/rss
    mode: rss
    active: true
    notes: "Replace with your actual RSS source"

  - id: example_http_source
    name: Example HTTP Source
    url: https://example.com/news
    mode: http
    active: true
    notes: "Replace with your actual HTTP source"

  - id: example_auto_source
    name: Example Auto-detect Source
    url: https://example.com/articles
    mode: auto
    active: true
    notes: "Replace with your actual source — mode auto tries rss, http, trafilatura in order"
