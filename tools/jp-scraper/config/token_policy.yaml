token_policy:
  llm_read_priority:
    - scan_summary.md
    - scan_delta.jsonl
    - errors.jsonl
  forbidden_by_default:
    - raw_html
    - full_dom
    - screenshots
    - full_jsonl
  max_summary_chars: 6000
  max_delta_records_for_llm: 50
  require_delta_before_llm: true
  require_cache_before_fetch: true
  require_robots_check: true
