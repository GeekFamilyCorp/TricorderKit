# Example sources — replace with your own targets.
# Add entries following this schema and run: jp-scraper sources audit
sources:
  - id: example_rss_source
    name: Example RSS News
    category: news
    base_url: "https://example.com/news"
    method_priority: ["rss", "http", "trafilatura"]
    rss_url: "https://example.com/news/feed"
    sitemap_url: null
    respect_robots: true
    crawl_delay_seconds: 3
    selectors_profile: generic_news
    output_schema: news_record
    reliability: professional_media

  - id: example_http_source
    name: Example HTTP Listing
    category: content
    base_url: "https://example.com/content"
    method_priority: ["http", "trafilatura"]
    rss_url: null
    sitemap_url: null
    respect_robots: true
    crawl_delay_seconds: 5
    selectors_profile: manga_listing_generic
    output_schema: manga_record
    reliability: official

  - id: example_sitemap_source
    name: Example Sitemap Source
    category: novels
    base_url: "https://example.com/novels"
    method_priority: ["sitemap", "http"]
    rss_url: null
    sitemap_url: "https://example.com/sitemap.xml"
    respect_robots: true
    crawl_delay_seconds: 5
    selectors_profile: novel_listing_generic
    output_schema: light_novel_record
    reliability: official
