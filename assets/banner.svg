<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#11161f"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="scan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1f2733" stroke-width="1" opacity="0.5">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M256 0 V640 M512 0 V640 M768 0 V640 M1024 0 V640"/>
  </g>

  <!-- scanner motif (right) -->
  <circle cx="1010" cy="320" r="230" fill="url(#scan)"/>
  <g fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.85">
    <circle cx="1010" cy="320" r="60"/>
    <circle cx="1010" cy="320" r="115" opacity="0.6"/>
    <circle cx="1010" cy="320" r="170" opacity="0.35"/>
  </g>
  <g stroke="#2dd4bf" stroke-width="3" stroke-linecap="round">
    <line x1="1010" y1="320" x2="1010" y2="170"/>
    <line x1="1010" y1="320" x2="1135" y2="395"/>
  </g>
  <circle cx="1010" cy="320" r="7" fill="#2dd4bf"/>

  <!-- wordmark -->
  <rect x="96" y="150" width="56" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="124" cy="178" r="13" fill="url(#accent)"/>
  <text x="172" y="196" font-size="58" font-weight="700" fill="#e6edf3">TricorderKit</text>

  <text x="98" y="300" font-size="44" font-weight="700" fill="#e6edf3">The local-first <tspan fill="#2dd4bf">Agentic Knowledge OS</tspan></text>
  <text x="98" y="352" font-size="26" fill="#9aa7b4">Turn intentions into traceable, auditable, reusable workflows.</text>
  <text x="98" y="392" font-size="26" fill="#9aa7b4">CLI-first · self-improving · measured · runs on your machine.</text>

  <!-- feature chips -->
  <g font-size="22" font-weight="600">
    <g transform="translate(98,452)">
      <rect width="170" height="46" rx="23" fill="#161b22" stroke="#2dd4bf" stroke-opacity="0.5"/>
      <text x="85" y="30" text-anchor="middle" fill="#cdd9e5">Skills + Plugins</text>
    </g>
    <g transform="translate(286,452)">
      <rect width="132" height="46" rx="23" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.5"/>
      <text x="66" y="30" text-anchor="middle" fill="#cdd9e5">Memory</text>
    </g>
    <g transform="translate(436,452)">
      <rect width="170" height="46" rx="23" fill="#161b22" stroke="#2dd4bf" stroke-opacity="0.5"/>
      <text x="85" y="30" text-anchor="middle" fill="#cdd9e5">Hybrid RAG</text>
    </g>
    <g transform="translate(624,452)">
      <rect width="200" height="46" rx="23" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.5"/>
      <text x="100" y="30" text-anchor="middle" fill="#cdd9e5">Self-Improving</text>
    </g>
    <g transform="translate(98,512)">
      <rect width="210" height="46" rx="23" fill="#161b22" stroke="#2dd4bf" stroke-opacity="0.5"/>
      <text x="105" y="30" text-anchor="middle" fill="#cdd9e5">Security gates</text>
    </g>
    <g transform="translate(326,512)">
      <rect width="240" height="46" rx="23" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.5"/>
      <text x="120" y="30" text-anchor="middle" fill="#cdd9e5">Local LLM (Ollama)</text>
    </g>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="632" width="1280" height="8" fill="url(#accent)"/>
</svg>
