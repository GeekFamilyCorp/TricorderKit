name: learning-engine
version: 0.1.0
status: draft
decision: DEC-046
created: 2026-06-11
description: >
  Mémoire d'expérience et rétro-amélioration contrôlée — transforme les runs
  en leçons, propositions de skill updates et classements de stratégies,
  avec tests et validation humaine avant toute promotion.
loop: "Run -> Trace -> Score -> Compare -> Learn -> Propose -> Test -> Review -> Promote -> Monitor"
depends_on:
  - workflow-engine
  - eval-lab
  - graphify
  - deep-research-core
contracts:
  output: core/contracts/skill_output.schema.json
  schemas:
    - schemas/run_experience.schema.json
    - schemas/experience_card.schema.json
    - schemas/strategy_variant.schema.json
    - schemas/lesson.schema.json
    - schemas/skill_update_proposal.schema.json
guardrails:
  human_review_required_default: true
  core_self_modification: forbidden
  promotion_requires_tests: 8
  scraped_content_is_untrusted: true
