name: deep-research-core
version: 0.1.0
type: plugin
description: Local-first autonomous research engine - multi-source collection, deduplication, scoring, Markdown synthesis
author: TricorderKit

skills:
  - tk-deep-research

commands:
  - /tk:deep-research

dependencies:
  - python: ">=3.11"
  - packages:
    - requests
    - pyyaml
    - jsonschema

pipelines:
  - name: content_sources_research
    file: pipelines/content_sources_research.yml
    status: ready
  - name: entity_research
    file: pipelines/entity_research.yml
    status: planned
  - name: github_research
    file: pipelines/github_research.yml
    status: planned
  - name: vendor_research
    file: pipelines/vendor_research.yml
    status: planned

sources:
  trusted: sources/trusted_sources.yml
  blocked: sources/blocked_sources.yml

outputs:
  - type: markdown
    path: "vault/reports/"
  - type: json
  - type: obsidian_notes
    vault: "${OBSIDIAN_VAULT_PATH}"

infrastructure_optional:
  - service: qdrant
    port: 6333
    note: "Degraded mode if unavailable"

token_budget:
  max_per_research: 20000
  warn_at: 15000
  on_exceeded: pause_and_notify

status: scaffold_ready
phase: 4
