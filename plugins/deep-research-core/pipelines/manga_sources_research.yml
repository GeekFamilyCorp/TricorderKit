# content_sources_research.yml — Generic content research pipeline for TricorderKit
# Version: 0.1.0 — stub (adapt to your domain sources)
# Rename this file to match your domain, e.g. news_research.yml, product_research.yml

name: content_sources_research
version: 0.1.0
description: Generic content research pipeline — adapt sources and steps to your domain

token_budget:
  max_tokens: 20000
  warn_at: 15000
  on_exceeded: pause_and_notify

dry_run: true

# ── Pipeline steps ──────────────────────────────────────────────────────────
steps:

  - id: collect_source_1
    name: Collect from primary API source
    source: trusted_sources.primary_api[0]
    action: search
    params:
      fields: [title, authors, tags, status, year]
      limit: 50
    output: raw_source_1
    on_error: continue

  - id: collect_source_2
    name: Collect from secondary source
    source: trusted_sources.secondary[0]
    action: search
    params:
      fields: [title, score, rank, status]
      limit: 25
    output: raw_source_2
    on_error: continue

  - id: deduplicate
    name: Deduplication
    action: deduplicate
    inputs: [raw_source_1, raw_source_2]
    strategy: title_hash_similarity
    similarity_threshold: 0.85
    output: deduplicated_items

  - id: score_reliability
    name: Reliability scoring
    action: score
    input: deduplicated_items
    method: weighted_sources
    weights:
      primary_api: 0.92
      secondary: 0.85
    min_score: 0.70
    output: scored_items

  - id: generate_report
    name: Markdown report generation
    action: report
    input: scored_items
    template: generic_report_template
    output_path: "vault/reports/content_watch_{date}.md"
    sections:
      - New items
      - Rankings
      - Trends
    include_sources: true
    max_items_per_section: 10

  - id: index_obsidian
    name: Obsidian indexing
    action: write_obsidian
    input: scored_items
    vault_path: "${OBSIDIAN_VAULT_PATH}"
    target_folder: "10_DOMAINS/content"
    create_if_missing: true
    update_if_exists: true

  - id: index_qdrant
    name: Qdrant indexing (RAG)
    action: upsert_vectors
    input: scored_items
    collection: content_knowledge
    embedding_field: description
    metadata_fields: [title, authors, tags, score, year, source]

# ── Final output ────────────────────────────────────────────────────────────
output:
  format: json
  summary_fields: [title, authors, score, source, report_path]
  report_path: "vault/reports/content_watch_{date}.md"

# ── Schedule ────────────────────────────────────────────────────────────────
schedule:
  default_interval_minutes: 60
  min_interval_minutes: 30
