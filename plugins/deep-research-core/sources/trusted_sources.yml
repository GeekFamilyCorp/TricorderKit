# trusted_sources.yml — TricorderKit deep-research-core
# Trusted sources allowed for autonomous research
# Version: 0.1.0 — stub (replace with your domain sources)

# ── Primary API sources ──────────────────────────────────────────────────────
primary_api:
  - name: Your Primary API
    url: https://api.your-source.com
    type: api_rest
    reliability: 0.92
    rate_limit: 5/min
    cache_ttl: 900
    notes: "Replace with your actual primary API source."

  - name: Your Secondary API
    url: https://api.your-second-source.com
    type: api_rest
    reliability: 0.88
    rate_limit: 3/sec
    cache_ttl: 1800
    notes: "Replace with your actual secondary API source."

# ── Scraped sources ──────────────────────────────────────────────────────────
secondary:
  - name: Your Ranking Source
    url: https://www.your-ranking-source.com
    type: scrape
    reliability: 0.85
    cache_ttl: 3600
    notes: "Replace with your actual ranking/aggregator source."

  - name: Your News Source
    url: https://www.your-news-source.com
    type: scrape
    reliability: 0.88
    cache_ttl: 1800
    notes: "Replace with your actual news source."

# ── GitHub / Tech ────────────────────────────────────────────────────────────
github:
  - name: GitHub API
    url: https://api.github.com
    type: api_rest
    reliability: 0.99
    rate_limit: 5000/hour
    cache_ttl: 300
    auth_required: true
    auth_method: token
    notes: "Primary source for GitHub repo ingestion."

  - name: GitHub Search
    url: https://api.github.com/search
    type: api_rest
    reliability: 0.97
    rate_limit: 30/min
    cache_ttl: 300
    notes: "Code, repo, issues search."

# ── Global scoring weights ──────────────────────────────────────────────────
scoring_weights:
  official_api: 1.0
  official_site: 0.9
  aggregator_api: 0.85
  aggregator_scrape: 0.75
  community_wiki: 0.65
  social_media: 0.40
  unknown: 0.20
